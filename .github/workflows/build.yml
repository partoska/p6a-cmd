name: Build
on: [push]
jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DWITH_SANITIZERS=ON -DWITH_VERBOSE_DEBUG=ON -DWITH_TESTS=ON -DCMAKE_VERBOSE_MAKEFILE=ON
      - name: Build
        run: cmake --build build --parallel 1
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_linux_amd64
          path: build/src/p6a
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          cache: true
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-ninja
      - name: Configure CMake
        shell: msys2 {0}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DWITH_SANITIZERS=OFF -DWITH_VERBOSE_DEBUG=ON -DWITH_TESTS=ON -DCMAKE_VERBOSE_MAKEFILE=ON -DCURL_USE_STATIC_LIBS=ON
      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel 1
      - name: Run tests
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_windows_amd64
          path: build/src/p6a.exe
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install curl pkg-config
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DWITH_SANITIZERS=ON -DWITH_VERBOSE_DEBUG=ON -DWITH_TESTS=ON -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
      - name: Build
        run: cmake --build build --parallel 1
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_darwin_universal
          path: build/src/p6a
