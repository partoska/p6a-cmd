name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev rpm
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DWITH_SANITIZERS=OFF -DWITH_VERBOSE_DEBUG=OFF -DWITH_TESTS=OFF -DCMAKE_VERBOSE_MAKEFILE=ON
      - name: Build
        run: cmake --build build --parallel 1
      - name: Package
        run: cpack --config build/CPackConfig.cmake
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_linux_amd64
          path: build/src/p6a
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages_linux_amd64
          path: dist/
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          cache: true
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nsis
      - name: Configure CMake
        shell: msys2 {0}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DWITH_SANITIZERS=OFF -DWITH_VERBOSE_DEBUG=OFF -DWITH_TESTS=OFF -DCMAKE_VERBOSE_MAKEFILE=ON -DCURL_USE_STATIC_LIBS=ON
      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel 1
      - name: Package (ZIP)
        shell: msys2 {0}
        run: cpack --config build/CPackConfig.cmake -G ZIP
      - name: Package (NSIS)
        shell: msys2 {0}
        run: |
          VERSION=$(grep "CMAKE_PROJECT_VERSION:STATIC" build/CMakeCache.txt | cut -d= -f2)
          cpack --config build/CPackConfig.cmake -G NSIS -D CPACK_PACKAGE_FILE_NAME="p6a_${VERSION}_windows_amd64_setup"
      - name: Package (WIX)
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath "$WIX")/bin:$PATH"
          cpack --config build/CPackConfig.cmake -G WIX
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_windows_amd64
          path: build/src/p6a.exe
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages_windows_amd64
          path: dist/
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install curl pkg-config
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DWITH_SANITIZERS=OFF -DWITH_VERBOSE_DEBUG=OFF -DWITH_TESTS=OFF -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
      - name: Build
        run: cmake --build build --parallel 1
      - name: Package
        run: cpack --config build/CPackConfig.cmake
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6a_darwin_universal
          path: build/src/p6a
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages_darwin_universal
          path: dist/
  release:
    needs: [build-linux-amd64, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename binaries
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          cp artifacts/p6a_linux_amd64/p6a p6a_${VERSION}_linux_amd64
          cp artifacts/p6a_windows_amd64/p6a.exe p6a_${VERSION}_windows_amd64.exe
          cp artifacts/p6a_darwin_universal/p6a p6a_${VERSION}_darwin_universal
      - name: Upload binaries to release
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          gh release upload ${{ github.ref_name }} p6a_${VERSION}_linux_amd64 p6a_${VERSION}_windows_amd64.exe p6a_${VERSION}_darwin_universal --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload packages to release
        run: gh release upload ${{ github.ref_name }} artifacts/packages_*/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
